name: Build and Test
description: "Build and test it"

runs:
  using: "composite"
  steps:
    - name: Setup go
      uses: actions/setup-go@v6
      with:
        go-version-file: ./go.mod

    - name: Run go vet
      shell: bash
      run: go vet ./...

    - name: Run Staticcheck
      shell: bash
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest && \
        staticcheck ./...

    - name: Test the source
      shell: bash
      run: go test ./...
